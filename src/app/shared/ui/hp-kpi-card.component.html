<article class="hp-kpi">
  <div class="hp-kpi__top">
    <span class="hp-kpi__label">{{ label() }}</span>
    <span class="hp-kpi__icon" aria-hidden="true">
      @switch (icon()) {
        @case ('package') {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
            <path d="M3.27 6.96 12 12.01l8.73-5.05M12 22.08V12" />
          </svg>
        }
        @case ('check') {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
            <path d="M22 4 12 14.01l-3-3" />
          </svg>
        }
        @case ('user') {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        }
        @case ('money') {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <rect x="3" y="6" width="18" height="12" rx="2" />
            <path d="M12 10v4M9 12h6" />
          </svg>
        }
        @case ('building') {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <path d="M3 21h18M5 21V7l7-4v18M12 21V11l7 4v6M9 9v.01M9 12v.01M9 15v.01" />
          </svg>
        }
        @case ('users') {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
        }
      }
    </span>
  </div>
  @if (isCurrency()) {
    <p class="hp-kpi__value">
      {{ value() | number: '1.0-0' }}<span class="hp-kpi__currency">₺</span>
    </p>
  } @else {
    <p class="hp-kpi__value">{{ value() }}</p>
  }
  <p class="hp-kpi__hint">{{ hint() }}</p>
</article>
